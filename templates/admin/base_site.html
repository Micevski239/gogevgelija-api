{% extends "admin/base.html" %}
{% load static i18n %}

{% block extrahead %}
{{ block.super }}
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YcnS/1p0FRSLB5ABQ3mPbp6i9lOORXQNs3Ii" crossorigin="anonymous">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link rel="stylesheet" href="{% static 'admin/css/go-admin.css' %}">
{% endblock %}

{% block branding %}
<a href="{% url 'admin:index' %}" style="text-decoration:none;display:flex;align-items:center;gap:10px;">
  <span style="font-size:20px;font-weight:700;color:#b91c1c;">GoGevgelija</span>
  <span style="font-size:11px;color:#9ca3af;font-weight:500;">Admin</span>
</a>
{% endblock %}

{% block footer %}
<div id="gg-footer">
  <span>&copy; GoGevgelija {{ YEAR }}</span>
</div>
{% endblock %}
